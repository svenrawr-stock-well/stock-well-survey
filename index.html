<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Stock-Well Vending - Favorites Survey</title>
  <meta name="description" content="Pick your vending items so we can stock this machine with what you want." />
  <style>
    :root { --bg:#0f0f10; --card:#141416; --ink:#f4f4f5; --muted:#b5b5be; --line:#2a2a2e; --accent:#ff6a00; }
    * { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 0; background: var(--bg); color: var(--ink); }
    .wrap { max-width: 820px; margin: 0 auto; padding: 24px; }
    .brand { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .badge { font-size: 12px; background: #1b1c1f; padding: 4px 10px; border-radius: 999px; border: 1px solid var(--line); }
    .card { background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 18px; }
    h1 { font-size: 22px; margin: 4px 0 6px; }
    p { margin: 0 0 14px; color: var(--muted); }
    .chips { display:flex; flex-wrap:wrap; gap:8px; margin: 8px 0 12px; }
    .chip { font-size: 13px; padding: 8px 12px; border-radius: 999px; border: 1px solid var(--line); background:#1b1c1f; color:#ddd; cursor:pointer; user-select:none; }
    .chip.active { background: linear-gradient(90deg, #202022 0%, var(--accent) 100%); color:#fff; border-color: transparent; }
    .search { display:flex; gap:8px; align-items:center; margin: 8px 0 12px; }
    .search input { width:100%; background:#191a1d; border:1px solid var(--line); border-radius:10px; color:var(--ink); padding:10px 12px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .item { background: #191a1d; border: 1px solid var(--line); border-radius: 12px; padding: 10px; display: flex; align-items: center; gap: 10px; }
    .item input { transform: scale(1.2); }
    .sectionTitle { margin-top: 14px; margin-bottom: 6px; font-size: 16px; color:#e7e7ea; }
    .actions { display: flex; gap: 10px; margin-top: 14px; }
    button { appearance: none; border: 0; border-radius: 10px; padding: 12px 16px; cursor: pointer; font-weight: 600; }
    .btn { background: linear-gradient(90deg, #202022 0%, var(--accent) 100%); color: white; }
    .ghost { background: #1b1c1f; color: #ddd; border: 1px solid var(--line); }
    .hint { font-size: 12px; color: #8f9098; margin-top: 8px; }
    .footer { margin-top: 16px; font-size: 12px; color: #8f9098; text-align: center; }
    .error { color: #ff9a9a; margin-top: 8px; }
    .ok { color: #6df0a6; margin-top: 8px; }
    textarea { width:100%; background:#191a1d; border:1px solid var(--line); border-radius:10px; color:var(--ink); padding:10px; resize:vertical; }
    label.small { display:block; margin: 8px 0 6px; color:#ddd; font-size: 14px; }
    .empty { padding: 8px 0; color: #9a9aa3; }
    @media (max-width: 640px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <div class="badge">Stock-Well Vending</div>
      <div id="machineTag" class="badge">Machine: ...</div>
    </div>

    <div class="card">
      <h1>Pick your favorites</h1>
      <p>Help us stock this machine with what you actually want. Select as many items as you like.</p>

      <form id="surveyForm">
        <input type="hidden" name="machine_id" id="machine_id" />

        <!-- Category filter chips (multi-select) -->
        <div class="chips" id="chips"></div>

        <!-- Search -->
        <div class="search">
          <input id="searchBox" type="search" placeholder="Search items... (e.g., Doritos, Kind Bar, Coke)" autocomplete="off" />
        </div>

        <!-- Items render here -->
        <div id="itemsContainer"></div>
        <div id="emptyMsg" class="empty" style="display:none">No items match your search or filter.</div>

        <!-- Simple counter -->
        <div class="hint">Selected: <span id="selectedCount">0</span> items</div>

        <label for="suggestion" class="small">Suggest an item we do not carry (optional)</label>
        <textarea id="suggestion" name="suggestion" rows="3" maxlength="240" placeholder="Type your suggestion here..."></textarea>
        <div class="hint"><span id="sCount">0</span>/240</div>

        <div id="msg" class=""></div>

        <div class="actions">
          <button type="submit" class="btn">Submit</button>
          <button type="button" class="ghost" id="clearBtn">Clear</button>
        </div>
      </form>

      <div class="footer">Thank you for helping us improve your breakroom.</div>
    </div>
  </div>

<script>
  // Submit to your same-origin Netlify Function (proxy to GAS)
  const SCRIPT_ENDPOINT = "/.netlify/functions/submit";

  // ---- Categories & Items ---- (EXACT MATCH to your new catalog PDF)
  const C_COLD    = "Cold Beverages";
  const C_CHIPS   = "Chips";
  const C_CRACKERS = "Crackers & Nuts";
  const C_BARS    = "Bars";
  const C_COOKIES = "Cookies & Pastries";
  const C_CHOCO   = "Chocolates & Candies";
  const C_QUICK   = "Quick Meals & Deli Options";
  const C_FROZEN  = "Frozen Market (Freezer Locations Only)";

  const CATEGORIES = [C_COLD, C_CHIPS, C_CRACKERS, C_BARS, C_COOKIES, C_CHOCO, C_QUICK, C_FROZEN];

  function unique(list){const s=new Set();const out=[];list.forEach(x=>{const k=x.toLowerCase();if(!s.has(k)){s.add(k);out.push(x);}});return out;}

  const DATA = {
    [C_COLD]: unique(["Coca-Cola","Diet Coke","Coca-Cola Zero","Pepsi","Diet Pepsi","Mountain Dew","A&W Root Beer","Sprite","7-Up","Canada Dry Ginger Ale","Dr Pepper","Diet Dr Pepper","Ghost","C4","Alani Nu","Celsius Tropical Vibes","Monster Energy","Red Bull","Coca-Cola","Diet Coke","Sprite","Pepsi","Mountain Dew","Crush Orange","Lipton Green Tea","Welch's Grape","Snapple Peach","Bai Blueberry","Muscle Milk Chocolate","Fairlife Protein Chocolate","Premier Protein Chocolate","Gatorade","Powerade","Minute Maid Lemonade","FIJI Water","Dasani Water"]),
    [C_CHIPS]: unique(["Doritos Nacho Cheese","Doritos Cool Ranch","Miss Vickie's Jalapeño","Munchies Cheese Fix","Lays Classic","Lays Salt & Vinegar","Lays Sour Cream & Onion","Lays Barbecue","SunChips French Onion","SunChips Harvest Cheddar","Fritos Original","Fritos Chili Cheese","Cheetos Crunchy","Cheetos Flamin' Hot","Cheetos Puffs","PopCorners Sea Salt","PopCorners Kettle Corn","PopCorners Jalapeño Cheddar","PopCorners White Cheddar","Veggie Straws","Lays Oven Baked","Lays Baked","Ruffles Original","Ruffles Cheddar & Sour Cream","Funyuns","Takies Fuego"]),
    [C_CRACKERS]: unique(["Goldfish Cheddar","Cheez-It Original","Honey Maid Graham Crackers","Snyder's Mini Pretzels","Dot's Homestyle Pretzels","Lance Captain's Wafers","Lance Toast Chee","Lance Captain's Wafers Peanut Butter","Planters Peanuts","Planters Deluxe Mixed Nuts","Planters Salted Peanuts","Kari's Mixed Nuts"]),
    [C_BARS]: unique(["Nutri-Grain Apple Cinnamon","Nutri-Grain Strawberry","Nutri-Grain Blueberry","Kind Dark Chocolate Nuts & Sea Salt","Kind Caramel Almond & Sea Salt","Quest Chocolate Chip Cookie Dough","Nature Valley Oats 'n Honey","Nature Valley Peanut Butter","Nature Valley Chocolate Chunk","Clif Bar Chocolate Chip","Robert Irvine's Fit Crunch","Clif Bar Peanut Butter"]),
    [C_COOKIES]: unique(["Grandma's Chocolate Chip","Grandma's Peanut Butter","Famous Amos Chocolate Chip","Grandma's Oatmeal Raisin","Teddy Grahams Honey","Nutter Butter","Oreo Original","Chips Ahoy! Chocolate Chip","Pop-Tarts Frosted Strawberry","Pop-Tarts Brown Sugar Cinnamon","Little Bites Blueberry Muffins","Honey Bun","Big Texas Cinnamon Roll"]),
    [C_CHOCO]: unique(["Snickers","Twix","Milky Way","Hershey's Milk Chocolate","Hershey's Special Dark","Butterfinger","Reese's Peanut Butter Cups","KitKat","Skittles Original","M&M's Milk Chocolate","M&M's Peanut","Skittles Sour","Extra Spearmint","Trident Original","Welch's Fruit Snacks"]),
    [C_QUICK]: unique(["Hillshire Snacking Genoa Salame","Lunchables Turkey & Cheddar","Cheese String","Honey Salmon Stackers","Nissin Cup Noodles Spicy","Cup Noodles Chicken","Brunswick Chicken Salad","Kraft Mac & Cheese","Fresh & Ready Turkey Sandwich","Fresh & Ready Chicken Caesar","Chicken Caesar Salad","Sabra Hummus & Crackers"]),
    [C_FROZEN]: unique(["Uncruatables Pepperoni Pizza","Uncruatables Cheese Pizza","Jimmy Dean Pancakes & Sausage","Jimmy Dean Croissant Sausage","Hot Pockets Pepperoni Pizza","Hot Pockets Ham & Cheese","Marie Callender's Chicken Pot Pie","Kahiki Chicken Fried Rice","Oreo Frozen Sandwiches","Drumstick Vanilla","Salted Caramel Almond Ice Pops","Ben & Jerry's Chocolate Brownie"])
  };

    // Build a map (lowercase key -> original label) so we can submit with original casing
    const keyOf = (name) => name.toLowerCase();
    const labelByKey = new Map();
    CATEGORIES.forEach(cat => (DATA[cat] || []).forEach(name => labelByKey.set(keyOf(name), name)));

    // --- persistent state ---
    const selected = new Set();   // item keys the user has chosen
    const activeCats = new Set(); // categories currently filtered (empty => All)

    // machine id
    const params = new URLSearchParams(window.location.search);
    const machineId = (params.get("machine_id") || "").trim();

    // dom
    const machineTag = document.getElementById("machineTag");
    const machineInput = document.getElementById("machine_id");
    const chipsEl = document.getElementById("chips");
    const itemsContainer = document.getElementById("itemsContainer");
    const emptyMsg = document.getElementById("emptyMsg");
    const msg = document.getElementById("msg");
    const suggestionEl = document.getElementById("suggestion");
    const sCount = document.getElementById("sCount");
    const searchBox = document.getElementById("searchBox");
    const selectedCount = document.getElementById("selectedCount");

    machineTag.textContent = machineId ? ("Machine: " + machineId) : "Machine: MISSING";
    machineInput.value = machineId;

    let checkboxes = [];

    // ---- chips (multi-select) ----
    function renderChips() {
      chipsEl.innerHTML = "";

      // "All" reset chip
      const reset = document.createElement("button");
      reset.type = "button";
      reset.className = "chip" + (activeCats.size === 0 ? " active" : "");
      reset.textContent = "All";
      reset.addEventListener("click", () => {
        activeCats.clear();
        renderChips();
        render();
      });
      chipsEl.appendChild(reset);

      // category chips
      CATEGORIES.forEach(lbl => {
        const b = document.createElement("button");
        b.type = "button";
        b.className = "chip" + (activeCats.has(lbl) ? " active" : "");
        b.textContent = lbl;
        b.addEventListener("click", () => {
          if (activeCats.has(lbl)) activeCats.delete(lbl);
          else activeCats.add(lbl);
          renderChips();
          render();
        });
        chipsEl.appendChild(b);
      });
    }

    // ---- filtering & rendering ----
    function filteredItems() {
      const term = (searchBox.value || "").toLowerCase();
      const cats = activeCats.size ? Array.from(activeCats) : CATEGORIES;
      const rows = [];
      const seen = new Set();
      cats.forEach(cat => {
        (DATA[cat] || []).forEach(name => {
          if (!term || name.toLowerCase().includes(term)) {
            const k = keyOf(name);
            if (!seen.has(k)) { seen.add(k); rows.push({ cat, name }); }
          }
        });
      });
      return rows;
    }

    function render() {
      itemsContainer.innerHTML = "";
      const rows = filteredItems();

      if (!rows.length) {
        emptyMsg.style.display = "block";
        checkboxes = [];
        updateCounter();
        return;
      }
      emptyMsg.style.display = "none";

      // group by category for display
      const byCat = {};
      rows.forEach(r => (byCat[r.cat] = byCat[r.cat] || []).push(r.name));
      const catsToShow = activeCats.size ? Array.from(activeCats) : Object.keys(byCat);

      const newCheckboxes = [];
      catsToShow.forEach(cat => {
        const title = document.createElement("div");
        title.className = "sectionTitle";
        title.textContent = cat;
        itemsContainer.appendChild(title);

        const grid = document.createElement("div");
        grid.className = "grid";

        (byCat[cat] || []).forEach(label => {
          const id = "item_" + keyOf(label).replace(/[^a-z0-9]+/g, "_");
          const wrap = document.createElement("label");
          wrap.className = "item";

          const input = document.createElement("input");
          input.type = "checkbox";
          input.name = "items";
          input.value = label;
          input.id = id;

          // restore checked state from the persistent Set
          const k = keyOf(label);
          input.checked = selected.has(k);

          // update the Set when toggled
          input.addEventListener("change", (e) => {
            if (e.target.checked) selected.add(k);
            else selected.delete(k);
            updateCounter();
          });

          const span = document.createElement("span");
          span.textContent = label;

          wrap.appendChild(input);
          wrap.appendChild(span);
          grid.appendChild(wrap);

          newCheckboxes.push(input);
        });

        itemsContainer.appendChild(grid);
      });

      checkboxes = newCheckboxes;
      updateCounter();
    }

    function updateCounter() {
      selectedCount.textContent = selected.size;
    }

    // ---- init ----
    renderChips();
    render();
    searchBox.addEventListener("input", render);
    suggestionEl.addEventListener("input", () => { sCount.textContent = suggestionEl.value.length; });

    // Clear everything (including filters & selections)
    document.getElementById("clearBtn").addEventListener("click", () => {
      selected.clear();
      suggestionEl.value = "";
      sCount.textContent = "0";
      searchBox.value = "";
      activeCats.clear();
      renderChips();
      render();
      msg.className = "";
      msg.textContent = "";
    });

    // ---- submit ----
    document.getElementById("surveyForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      if (!machineId) { msg.className="error"; msg.textContent="Missing machine id."; return; }
      if (selected.size === 0) { msg.className="error"; msg.textContent="Please select at least one item."; return; }

      // Convert keys back to original labels for storage
      const choices = Array.from(selected).map(k => labelByKey.get(k) || k);

      const payload = {
        machine_id: machineId,
        choices,
        suggestion: suggestionEl.value.trim() || "",
        ts: new Date().toISOString(),
        ua: navigator.userAgent
      };

      try {
        const res = await fetch(SCRIPT_ENDPOINT, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        if (res.status >= 200 && res.status < 300) {
          msg.className = "ok";
          msg.textContent = "Thanks! Your preferences were recorded.";
          // lock UI
          checkboxes.forEach(c => c.disabled = true);
          suggestionEl.disabled = true;
          searchBox.disabled = true;
          chipsEl.querySelectorAll("button").forEach(b => b.disabled = true);
        } else {
          throw new Error("Bad status: " + res.status);
        }
      } catch (err) {
        msg.className = "error";
        msg.textContent = "Submission failed. Please try again.";
      }
    });
  </script>
</body>
</html>
